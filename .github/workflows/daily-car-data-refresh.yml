# Nightly refresh: optional remote CarsDataset + rebuild derived JSON.
# Enable: add repo secret CAR_DATA_JSON_URL (HTTPS JSON) or leave unset to only rebuild catalogs from committed cars.json.
# Grant Actions "Read and write permissions" if you want auto-commit (see bottom).

name: Daily car data refresh

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: car-data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Refresh datasets
        env:
          CAR_DATA_JSON_URL: ${{ secrets.CAR_DATA_JSON_URL }}
        run: node scripts/daily-refresh-car-data.mjs

      - name: Verify build
        run: npm run build

      - name: Verify tests
        run: npm run test

      # Uncomment to commit updated JSON to main (requires PAT with contents:write or default GITHUB_TOKEN + workflow permissions)
      # - name: Commit if changed
